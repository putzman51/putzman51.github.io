<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sliding in the light. a collection</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1713;
    --ink-light: #4a4540;
    --ink-faint: #9a9088;
    --paper: #faf8f4;
    --paper-warm: #f4f0e8;
    --accent: #8b6f47;
    --accent-light: #c4a882;
  }

  html { font-size: 16px; }

  body {
    background: #2a2520;
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  /* ── COVER ── */
  #cover {
    width: 100%;
    max-width: 560px;
    min-height: 100vh;
    background: var(--paper);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 3rem 3rem 3.5rem;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s ease;
  }

  #cover:hover { transform: translateY(-3px); }

  .cover-texture {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 80% 20%, rgba(196,168,130,0.12) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 80%, rgba(139,111,71,0.08) 0%, transparent 50%);
    pointer-events: none;
  }

  .cover-rule {
    width: 40px;
    height: 1px;
    background: var(--accent);
    margin-bottom: 2rem;
  }

  .cover-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 4rem;
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--ink);
    margin-bottom: 0.75rem;
  }

  .cover-subtitle {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 1rem;
    font-style: italic;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    margin-bottom: 3rem;
  }

  .cover-year {
    font-size: 0.8rem;
    color: var(--accent-light);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .cover-hint {
    position: absolute;
    bottom: 1.5rem;
    right: 2rem;
    font-size: 0.75rem;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
    font-style: italic;
  }

  /* ── TABLE OF CONTENTS ── */
  #toc {
    width: 100%;
    max-width: 560px;
    background: var(--paper-warm);
    padding: 3.5rem 3rem;
    display: none;
  }

  .toc-heading {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 2rem;
  }

  .toc-list {
    list-style: none;
  }

  .toc-item {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    padding: 0.45rem 0;
    border-bottom: 1px solid rgba(139,111,71,0.1);
    cursor: pointer;
    transition: color 0.2s;
  }

  .toc-item:hover .toc-poem-title { color: var(--accent); }

  .toc-num {
    font-size: 0.7rem;
    color: var(--accent-light);
    min-width: 1.5rem;
    font-style: italic;
  }

  .toc-poem-title {
    font-size: 1rem;
    font-style: italic;
    color: var(--ink);
    transition: color 0.2s;
    flex: 1;
  }

  /* ── POEM PAGES ── */
  .poem-page {
    width: 100%;
    max-width: 560px;
    background: var(--paper);
    padding: 4rem 3rem 4rem;
    display: none;
    position: relative;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .poem-number {
    font-size: 0.7rem;
    color: var(--accent-light);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    display: block;
  }

  .poem-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 400;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 2.5rem;
    line-height: 1.3;
  }

  .poem-body {
    font-size: 1rem;
    line-height: 1.75;
    color: var(--ink);
  }

  .stanza {
    margin-bottom: 1.4em;
  }

  .stanza:last-child { margin-bottom: 0; }

  .poem-line {
    display: block;
    line-height: 1.7;
  }

  .poem-line.indent { padding-left: 1.5em; }

  .section-label {
    font-size: 0.8rem;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
    margin-bottom: 0.8em;
    display: block;
    font-style: normal;
  }

  /* ── NAV ── */
  .nav-bar {
    width: 100%;
    max-width: 560px;
    background: var(--paper-warm);
    border-top: 1px solid rgba(139,111,71,0.15);
    display: none;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 2rem;
  }

  .nav-bar.visible { display: flex; }

  .nav-btn {
    font-family: 'EB Garamond', serif;
    font-size: 0.85rem;
    font-style: italic;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.4rem 0;
    transition: color 0.2s;
    letter-spacing: 0.05em;
  }

  .nav-btn:hover { color: var(--ink); }
  .nav-btn:disabled { color: var(--ink-faint); cursor: default; }

  .nav-counter {
    font-size: 0.75rem;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
  }

  /* ── COLOPHON ── */
  #colophon {
    width: 100%;
    max-width: 560px;
    background: var(--paper);
    padding: 4rem 3rem;
    display: none;
    text-align: center;
  }

  .colophon-rule {
    width: 30px;
    height: 1px;
    background: var(--accent-light);
    margin: 0 auto 2rem;
  }

  .colophon-text {
    font-size: 0.9rem;
    font-style: italic;
    color: var(--ink-faint);
    line-height: 1.8;
  }

  .colophon-site {
    display: inline-block;
    margin-top: 1.5rem;
    font-size: 0.85rem;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-decoration: none;
    border-bottom: 1px solid var(--accent-light);
    padding-bottom: 1px;
  }

  .back-to-cover {
    display: block;
    margin-top: 2.5rem;
    font-size: 0.8rem;
    color: var(--ink-faint);
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: none;
    border: none;
    font-family: 'EB Garamond', serif;
    transition: color 0.2s;
  }

  .back-to-cover:hover { color: var(--accent); }

  /* progress dots */
  .progress {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent-light);
    opacity: 0.3;
    transition: opacity 0.2s;
  }

  .dot.active { opacity: 1; background: var(--accent); }
</style>
</head>
<body>

<!-- COVER -->
<div id="cover" onclick="showTOC()">
  <div class="cover-texture"></div>
  <div class="cover-rule"></div>
  <h1 class="cover-title">sliding in<br>the light.</h1>
  <p class="cover-subtitle">a collection &nbsp;·&nbsp; 2026</p>
  <p class="cover-year">twelve poems</p>
  <span class="cover-hint">open →</span>
</div>

<!-- TABLE OF CONTENTS -->
<div id="toc">
  <p class="toc-heading">Contents</p>
  <ul class="toc-list" id="toc-list"></ul>
</div>

<!-- POEM PAGES (generated by JS) -->
<div id="poems-container"></div>

<!-- NAV BAR -->
<div class="nav-bar" id="nav-bar">
  <button class="nav-btn" id="prev-btn" onclick="navigate(-1)">← prev</button>
  <div class="progress" id="progress-dots"></div>
  <button class="nav-btn" id="next-btn" onclick="navigate(1)">next →</button>
</div>

<!-- COLOPHON -->
<div id="colophon">
  <div class="colophon-rule"></div>
  <p class="colophon-text">
    These poems were written in early 2026.<br>
    They are about light, the body, movement,<br>
    surrender, and the cost of attention.
  </p>
  <a class="colophon-site" href="https://fallingspoon.com" target="_blank">fallingspoon.com</a>
  <button class="back-to-cover" onclick="showCover()">return to cover</button>
</div>

<script>
const poems = [
  {
    title: "sealed in sand",
    sections: null,
    stanzas: [
      ["dry, dusty moonlit desert", "keeping clear skies,", "& each star stays lit for", "long enough to find itself, reaching for", "the tall range of torn earth,", "showing our true size."],
      ["Sonoran secrets", "sit calmly against the", "moonrise behind,", "halo of white gold glows for you."]
    ]
  },
  {
    title: "of alignment",
    stanzas: [
      ["the sky ties", "together all horizons,"],
      ["the land boundaries", "adjust for daylight."]
    ]
  },
  {
    title: "slipstreams surround me",
    stanzas: [
      ["there's this whole, elucidated", "lightness (thing)"],
      ["after taking a sip of Hi-C", "that is poured into a"],
      ["fragile,"],
      ["impossibly weightless", "picnic cup,"],
      ["from a", "one point six-six liter can."],
      ["the homeroom mom fills it,", "and the stream seems precarious,"],
      ["as the weight of the fluid", "is almost tipping the cup over,"],
      ["especially that first pour."],
      ["before they were filled", "we held them loosely between", "middle finger + thumb in one hand"],
      ["so careful not to break it", "but flicking it upward to watch it flip"],
      ["as if that was the game, and"],
      ["it was, but we needed it to stay", "intact if"],
      ["we wanted it full, and,", "there's this whole", "\u201clightness\u201d", "thing again. which feels heavy."],
      ["told not to flick it, we did anyway", "because we need to feel as light as the cup"],
      ["so I look around,", "and pretend to, giggling, because"],
      ["I need to know that gravity doesn't apply here", "and I don't want to break it,"],
      ["eyes widen while we almost make each other", "laugh."]
    ]
  },
  {
    title: "wind as it would be",
    sections: [
      {
        label: "i.",
        stanzas: [
          ["it fills", "space that needs it", "due to", "pressure systems."],
          ["always escaping.", "howling."],
          ["raging."],
          ["winding away, wispy", "making leaves flutter", "symphonically on the trees."]
        ]
      },
      {
        label: "ii.",
        stanzas: [
          ["sometimes I place myself", "all the way out in space."],
          ["wind doesn't feel the same up there,", "and it's quiet."],
          ["no space suit. Just a safe soul somehow,", "floating"],
          ["and I can't really even see a star or a planet,", "all so far away that I am surrounded"],
          ["by the dark."],
          ["the brightest dark."],
          ["and this is how the wind would be,", "staying steadily up above,", "pushing all the way to space so"],
          ["everything shrinks down a bit,", "and the distance wants to fold on itself."],
          ["collapsed."]
        ]
      },
      {
        label: "iii.",
        stanzas: [
          ["gentle pushes", "to continue to chase, and cheer, and flee", "the scene"],
          ["when I'm up there. In space.", "just being an imaginary space man"],
          ["I think,", "a little wind,"],
          ["would", "be nice."]
        ]
      }
    ]
  },
  {
    title: "understanding daylight through a dream",
    stanzas: [
      ["the sun pushes effortlessly,", "the trees block what they can."],
      ["light settles", "intently &", "splays itself on leaves,", "moving them slightly."],
      ["each cloud i see around,", "bases its dreams on me."],
      ["drifting into position,", "making sure i see,"],
      ["in a radiant garden,", "sunshine glowing gold,", "lush earth grasping my heart.", "smiles are shared;"],
      ["my dreams chase,", "each cloud i see around."]
    ]
  },
  {
    title: "sun-based sentience",
    stanzas: [
      ["the fibers of the rug outside", "have collected dirt."],
      ["Settling and", "softening."],
      ["the sun has soaked itself especially", "in the upper right corner,", "next to her spot, she sips", "chai tea and daydreams about", "dances that don't stop and jokes that build worlds around them.", "her tiny sigh slips through,", "discovering a moment of rest", "in the slightly faded corner of the rug."],
      ["you'd have to get low", "to really see the dirt."],
      ["the sun sits angled,", "it only comes in a little,", "arriving through windows of branches", "submerging her space in its light."]
    ]
  },
  {
    title: "hit",
    sections: [
      {
        label: "i. (injury)",
        stanzas: [
          ["there's a feeling –", "a concussion,", "where it feels like a roll of pennies just exists inside your face,", "and it's spreading around your head,", "and everything tastes like pennies.", "and it feels like the pennies are being pushed into your brain,", "and your eyes,", "and the whole thing is disorienting,", "because you're disoriented,", "and eventually you wake up and are told you cannot go back to sleep."]
        ]
      },
      {
        label: "ii. (flower)",
        stanzas: [
          ["the rose; silently climbing.", "patiently grows,", "its scent, up close,", "felt immediately in the frontal lobe."],
          ["a pillow of petals,", "stuffed suspiciously so,", "wanting to show off", "each little roseleaf."],
          ["blooms becoming aware", "together and", "tangled around trellis they", "smell like you think the vine tastes."]
        ]
      },
      {
        label: "iii. (kiss)",
        stanzas: [
          ["start inching", "from miles away."],
          ["sly squinting and", "resisting until the last second."],
          ["the pressure immeasurable,", "pushing petal to petal."]
        ]
      }
    ]
  },
  {
    title: "every city is mine",
    stanzas: [
      ["gummed up pavement", "pushing itself all the way out,", "until the strip malls start and the", "farmland sits tended nearby."],
      ["the corridor connections", "busy between each dot,", "traffic tracing gentle lines", "translating to its true signature."],
      ["it's the smell; everywhere.", "I own it.", "The way it's crisp or verdant", "or still yesterday's trash, that's me."],
      ["the book stapled, says \u201catlas\u201d,", "folded and frayed, taking orders", "as much as giving them. making", "it fun to take another new turn."],
      ["the sky is new here.", "the light, changed."],
      ["waking up without knowing north", "feels better than I ever thought it would."]
    ]
  },
  {
    title: "tempered perihelion",
    stanzas: [
      ["there's a time each day", "when golden orange hues", "streak through a vertically bound sea;", "beams held in suspended tension."],
      ["with so many others around,", "pretending to look elsewhere,", "while you do too."],
      ["it doesn't feel crowded now."],
      ["hiding together", "while the planets keep pulling", "themselves into", "position."]
    ]
  },
  {
    title: "the point is (me): occupied, reflected",
    stanzas: [
      ["quick trip to vertically", "positioned consciousness", "up, up, way up. Take myself", "to a star, and keep going."],
      ["I'm there. It's quiet. Dark."],
      ["an ocean seems tiny up here,", "the expanse filled with all", "the thoughts that were ever", "released."],
      ["it's dark, but I can see my hand."],
      ["I stay long enough to cycle through", "a breath or two, inside my soul"],
      ["the vacuum pulls at me, pushes,", "waits for me to make a move", "a wiggle in sand,"],
      ["I'm a leaf riding the top of a river,", "in a celestine carnival."],
      ["I come up to listen.", "I come up to think."],
      ["I float away knowing,", "the overview."]
    ]
  },
  {
    title: "steady through breath",
    stanzas: [
      ["almost afraid to engage it", "even though you know it works", "it's waiting, it's placing it", "right behind your path"],
      ["reaching back a little more", "knowing it's there", "slow to setup the brace", "slow to start the swing"],
      ["moving in, smoothing in", "letting it happen as you know", "it should and", "you watch it as you live it"],
      ["there's a pop", "when it's right.", "you know it happened,", "and it's not pretend."],
      ["explosion directed precisely", "practiced and patient", "it's okay what happens", "because I can watch it."],
      ["the flight is", "not the freedom.", "The freedom is a steady", "throughline of you."]
    ]
  },
  {
    title: "stalemate",
    stanzas: [
      ["dull grey glow", "covering two faces", "sitting, turned", "typing."],
      ["wondering why the", "words sit striking you", "still, \u201cuntil then?!\u201d", "she says on the phone."],
      ["seeing her face saying it,", "my mind has made up", "exactly how her eyes looked,", "and head tilted."],
      ["so i laugh;", "but not out loud."],
      ["i laugh inside;", "but it starts to drop", "into the dull, grey", "glow."]
    ]
  }
];

let currentPage = -1; // -1 = cover, -2 = toc, poems 0..n, n+1 = colophon
const total = poems.length;

function renderStanzas(stanzas) {
  return stanzas.map(lines => {
    const div = document.createElement('div');
    div.className = 'stanza';
    lines.forEach(l => {
      const span = document.createElement('span');
      span.className = 'poem-line';
      span.textContent = l;
      div.appendChild(span);
    });
    return div;
  });
}

function buildPoems() {
  const container = document.getElementById('poems-container');
  const tocList = document.getElementById('toc-list');

  poems.forEach((poem, i) => {
    // TOC entry
    const li = document.createElement('li');
    li.className = 'toc-item';
    li.innerHTML = `<span class="toc-num">${String(i+1).padStart(2,'0')}</span><span class="toc-poem-title">${poem.title}</span>`;
    li.onclick = () => showPoem(i);
    tocList.appendChild(li);

    // Poem page
    const page = document.createElement('div');
    page.className = 'poem-page';
    page.id = `poem-${i}`;

    const numSpan = document.createElement('span');
    numSpan.className = 'poem-number';
    numSpan.textContent = `${String(i+1).padStart(2,'0')} / ${String(total).padStart(2,'0')}`;
    page.appendChild(numSpan);

    const titleEl = document.createElement('h2');
    titleEl.className = 'poem-title';
    titleEl.textContent = poem.title;
    page.appendChild(titleEl);

    const body = document.createElement('div');
    body.className = 'poem-body';

    if (poem.sections) {
      poem.sections.forEach(sec => {
        const labelEl = document.createElement('span');
        labelEl.className = 'section-label';
        labelEl.textContent = sec.label;
        body.appendChild(labelEl);
        renderStanzas(sec.stanzas).forEach(s => body.appendChild(s));
        const spacer = document.createElement('div');
        spacer.style.height = '1.2em';
        body.appendChild(spacer);
      });
    } else {
      renderStanzas(poem.stanzas).forEach(s => body.appendChild(s));
    }

    page.appendChild(body);
    container.appendChild(page);
  });

  // Build progress dots
  const dots = document.getElementById('progress-dots');
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = `dot-${i}`;
    dots.appendChild(d);
  }
}

function hideAll() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('toc').style.display = 'none';
  document.querySelectorAll('.poem-page').forEach(p => p.style.display = 'none');
  document.getElementById('colophon').style.display = 'none';
  document.getElementById('nav-bar').classList.remove('visible');
  document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
}

function showCover() {
  hideAll();
  document.getElementById('cover').style.display = 'flex';
  currentPage = -1;
  window.scrollTo(0,0);
}

function showTOC() {
  hideAll();
  document.getElementById('toc').style.display = 'block';
  currentPage = -2;
  window.scrollTo(0,0);
}

function showPoem(i) {
  hideAll();
  const page = document.getElementById(`poem-${i}`);
  page.style.display = 'block';
  document.getElementById('nav-bar').classList.add('visible');
  const dot = document.getElementById(`dot-${i}`);
  if (dot) dot.classList.add('active');
  currentPage = i;

  const prev = document.getElementById('prev-btn');
  const next = document.getElementById('next-btn');
  prev.disabled = false;
  next.disabled = false;
  prev.textContent = i === 0 ? '← contents' : '← prev';
  next.textContent = i === total - 1 ? 'end →' : 'next →';

  window.scrollTo(0,0);
}

function showColophon() {
  hideAll();
  document.getElementById('colophon').style.display = 'block';
  document.getElementById('nav-bar').classList.add('visible');
  const prev = document.getElementById('prev-btn');
  const next = document.getElementById('next-btn');
  prev.disabled = false;
  prev.textContent = '← prev';
  next.disabled = true;
  next.textContent = '·';
  currentPage = total;
  window.scrollTo(0,0);
}

function navigate(dir) {
  if (currentPage === -2) {
    if (dir === 1) showPoem(0);
    return;
  }
  const next = currentPage + dir;
  if (next < 0) { showTOC(); return; }
  if (next >= total) { showColophon(); return; }
  showPoem(next);
}

buildPoems();
showCover();
</script>
</body>
</html>
